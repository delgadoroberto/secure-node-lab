name: Security Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:

      ####################################################################
      # Checkout Repository
      ####################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################################
      # Setup Node.js
      ####################################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      ####################################################################
      # Install Dependencies
      ####################################################################

      - name: Install Dependencies
        run: npm ci

      ####################################################################
      # Display Environment Information
      ####################################################################

      - name: Display Environment Information
        run: |
          echo "Node Version:"
          node --version
          echo ""

          echo "NPM Version:"
          npm --version

      ####################################################################
      # Dependency Vulnerability Scan (SCA)
      ####################################################################

      - name: Run npm Audit
        run: npm audit --audit-level=high

      ####################################################################
      # Static Application Security Testing (SAST)
      ####################################################################

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

      ####################################################################
      # Secret Detection
      ####################################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      ####################################################################
      # Pipeline Summary
      ####################################################################

      - name: Security Pipeline Summary
        if: always()
        run: |
          echo "========================================="
          echo "      Security Pipeline Completed"
          echo "========================================="
          echo ""
          echo "Completed Security Controls:"
          echo "  ✓ Dependency Scan (npm audit)"
          echo "  ✓ Static Analysis (Semgrep OSS)"
          echo "  ✓ Secret Detection (Gitleaks)"
          echo ""
          echo "Future integrations:"
          echo "  • CodeQL"
          echo "  • Trivy"
          echo "  • Dependency Review"
          echo "  • SBOM Generation"
          echo "  • Docker Image Scanning"
